name: Stream Runner

on:
  repository_dispatch:
    types:
      - metadata_scrape
      - stream_process

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Metadata Scrape
        if: github.event.action == 'metadata_scrape'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          node -e "
            import('./stream_engine.js').then(async mod => {
              const p = ${{ toJSON(github.event.client_payload) }};
              try {
                await mod.scrapeMetadata(p.magnet, p.chat_id);
              } catch(e) {
                console.error(e);
                process.exit(1);
              }
            });
          "

      - name: Stream Process
        if: github.event.action == 'stream_process'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          node -e "
            import('./stream_engine.js').then(async mod => {
              const p = ${{ toJSON(github.event.client_payload) }};
              try {
                if (p.mode === 'playlist') {
                  await mod.buildPlaylist(p.magnet, p.chat_id);
                } else {
                  await mod.processStream(p.magnet, p.file_index, p.chat_id, p.host);
                }
              } catch(e) {
                console.error(e);
                process.exit(1);
              }
            });
          "