name: Stream Runner

on:
  repository_dispatch:
    types:
      - metadata_scrape
      - stream_process
      - batch_process

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Telegram connectivity check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "Token length: ${#TELEGRAM_BOT_TOKEN}"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe")
          echo "getMe response: $RESP"
          OK=$(echo "$RESP" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).ok))")
          echo "Telegram API reachable: $OK"

      - name: Write payload to file
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: echo "$PAYLOAD" > payload.json

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
          ACTION: ${{ github.event.action }}
        run: node run.js "$ACTION"